<svg width="820" height="797" viewBox="0 0 820 797" xmlns="http://www.w3.org/2000/svg">
<rect width="100%" height="100%" fill="white"/>
<g opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.2s" fill="freeze"/>
  <text x="410" y="50" text-anchor="middle" font-family="system-ui,sans-serif" font-size="26" font-weight="800" fill="#1a1a2e">ATAC-seq Pipeline</text>
  <text x="410" y="74" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#666">Modular Snakemake workflow for paired-end ATAC-seq processing and motif discovery</text>
</g>
<g opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="1.0999999999999999s" fill="freeze"/>
  <line x1="40" y1="100" x2="780" y2="100" stroke="#ddd" stroke-width="1"/>
</g>
<g opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5999999999999999s" fill="freeze"/>
  <rect x="40" y="130" width="220" height="110" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.2"/>
  <text x="150" y="154" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#2D2678">1. Alignment &amp; Filtering</text>
  <text x="54" y="174" font-family="system-ui,sans-serif" font-size="11" fill="#534AB7">Adapter trimming via fastp.</text>
  <text x="54" y="190" font-family="system-ui,sans-serif" font-size="11" fill="#534AB7">Bowtie2 alignment to reference.</text>
  <text x="54" y="206" font-family="system-ui,sans-serif" font-size="11" fill="#534AB7">BAM sorting, mitochondrial</text>
  <text x="54" y="222" font-family="system-ui,sans-serif" font-size="11" fill="#534AB7">read removal, and PCR</text>
  <text x="54" y="238" font-family="system-ui,sans-serif" font-size="11" fill="#534AB7">duplicate filtering.</text>
</g>
<g opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="2.4s" fill="freeze"/>
  <rect x="280" y="130" width="220" height="110" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.2"/>
  <text x="390" y="154" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#2D2678">2. Accessibility Signal</text>
  <text x="294" y="174" font-family="system-ui,sans-serif" font-size="11" fill="#534AB7">Tn5 coordinate shifting to</text>
  <text x="294" y="190" font-family="system-ui,sans-serif" font-size="11" fill="#534AB7">exact cut sites. Normalized</text>
  <text x="294" y="206" font-family="system-ui,sans-serif" font-size="11" fill="#534AB7">coverage tracks (BigWig).</text>
  <text x="294" y="222" font-family="system-ui,sans-serif" font-size="11" fill="#534AB7">Peak calling with MACS2</text>
  <text x="294" y="238" font-family="system-ui,sans-serif" font-size="11" fill="#534AB7">and blacklist filtering.</text>
</g>
<g opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.2s" fill="freeze"/>
  <rect x="520" y="130" width="220" height="110" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.2"/>
  <text x="630" y="154" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#2D2678">3. Downstream &amp; QC</text>
  <text x="534" y="174" font-family="system-ui,sans-serif" font-size="11" fill="#534AB7">Peak annotation to genome.</text>
  <text x="534" y="190" font-family="system-ui,sans-serif" font-size="11" fill="#534AB7">Motif discovery (HOMER/MEME).</text>
  <text x="534" y="206" font-family="system-ui,sans-serif" font-size="11" fill="#534AB7">Comprehensive QA: FRiP scores,</text>
  <text x="534" y="222" font-family="system-ui,sans-serif" font-size="11" fill="#534AB7">TSS Enrichment, QC gating,</text>
  <text x="534" y="238" font-family="system-ui,sans-serif" font-size="11" fill="#534AB7">and MultiQC aggregation.</text>
</g>
<g opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="4.0s" fill="freeze"/>
  <line x1="40" y1="280" x2="780" y2="280" stroke="#ddd" stroke-width="1"/>
</g>
<g opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="4.5s" fill="freeze"/>
  <text x="40" y="310" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#1a1a2e">Repository Layout</text>
  <rect x="40" y="325" width="460" height="178" rx="6" fill="#f6f8fa" stroke="#d0d7de" stroke-width="0.8"/>
  <text x="52" y="345" font-family="SFMono-Regular,Consolas,monospace" font-size="11" fill="#24292f" xml:space="preserve">.</text>
  <text x="52" y="363" font-family="SFMono-Regular,Consolas,monospace" font-size="11" fill="#24292f" xml:space="preserve">├── Snakefile                 # Main Snakemake entry point</text>
  <text x="52" y="381" font-family="SFMono-Regular,Consolas,monospace" font-size="11" fill="#24292f" xml:space="preserve">├── config.yaml               # Central configuration (all rules)</text>
  <text x="52" y="399" font-family="SFMono-Regular,Consolas,monospace" font-size="11" fill="#24292f" xml:space="preserve">├── data/                     # Input FASTQs, references, motifs</text>
  <text x="52" y="417" font-family="SFMono-Regular,Consolas,monospace" font-size="11" fill="#24292f" xml:space="preserve">├── rules/                    # Modular rule files and scripts</text>
  <text x="52" y="435" font-family="SFMono-Regular,Consolas,monospace" font-size="11" fill="#24292f" xml:space="preserve">│   └── envs/                 # Rule-specific conda environments</text>
  <text x="52" y="453" font-family="SFMono-Regular,Consolas,monospace" font-size="11" fill="#24292f" xml:space="preserve">├── scripts/                  # run_pipeline.sh wrapper</text>
  <text x="52" y="471" font-family="SFMono-Regular,Consolas,monospace" font-size="11" fill="#24292f" xml:space="preserve">├── results/                  # Generated analysis outputs</text>
  <text x="52" y="489" font-family="SFMono-Regular,Consolas,monospace" font-size="11" fill="#24292f" xml:space="preserve">└── logs/                     # Per-rule logs and benchmark files</text>
</g>
<g opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="5.2s" fill="freeze"/>
  <line x1="40" y1="547" x2="780" y2="547" stroke="#ddd" stroke-width="1"/>
</g>
<g opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="5.7s" fill="freeze"/>
  <text x="40" y="577" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#1a1a2e">Quick Start</text>
  <text x="40" y="602" font-family="SFMono-Regular,Consolas,monospace" font-size="11" fill="#534AB7"># 1. Edit config.yaml and data/fastp/samples.tsv</text>
  <text x="40" y="622" font-family="SFMono-Regular,Consolas,monospace" font-size="11" fill="#534AB7"># 2. Dry run with config validation</text>
  <text x="40" y="637" font-family="SFMono-Regular,Consolas,monospace" font-size="11" fill="#24292f">scripts/run_pipeline.sh --dry-run</text>
  <text x="40" y="657" font-family="SFMono-Regular,Consolas,monospace" font-size="11" fill="#534AB7"># 3. Execute locally (e.g. 8 cores)</text>
  <text x="40" y="672" font-family="SFMono-Regular,Consolas,monospace" font-size="11" fill="#24292f">scripts/run_pipeline.sh --cores 8</text>
</g>
<g opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="6.4s" fill="freeze"/>
  <line x1="40" y1="717" x2="780" y2="717" stroke="#ddd" stroke-width="1"/>
</g>
<g opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="6.9s" fill="freeze"/>
  <text x="410" y="767" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#aaa">BDB-Genomics · atacseq-pipeline · MIT License</text>
</g>
</svg>
